<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 250" font-family="system-ui, sans-serif">
  <rect width="780" height="250" rx="10" fill="#ffffff"/>
  <text x="24" y="32" font-size="19" font-weight="600" fill="#1b2430">The daisy chain — one Raspberry Pi, many modules</text>
  <text x="24" y="54" font-size="13" fill="#6b7480">Each module has two identical I/F connectors (chain in / chain out). Set a unique ID on every module first.</text>

  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a4250"/></marker>
  </defs>

  <!-- head -->
  <rect x="24" y="96" width="150" height="80" rx="8" fill="#eef3fb" stroke="#2f7bd0"/>
  <text x="99" y="126" font-size="13" font-weight="600" fill="#1b2430" text-anchor="middle">Raspberry Pi</text>
  <text x="99" y="145" font-size="11" fill="#6b7480" text-anchor="middle">+ FTDI adapter</text>
  <text x="99" y="161" font-size="11" fill="#6b7480" text-anchor="middle">+ 12 V (pigtail)</text>

  <!-- modules -->
  <g>
    <rect x="220" y="104" width="104" height="64" rx="6" fill="#f3f5f8" stroke="#3a4250"/>
    <text x="272" y="132" font-size="13" font-weight="600" fill="#1b2430" text-anchor="middle">Module</text>
    <text x="272" y="150" font-size="12" fill="#2f7bd0" text-anchor="middle">ID 1</text>

    <rect x="358" y="104" width="104" height="64" rx="6" fill="#f3f5f8" stroke="#3a4250"/>
    <text x="410" y="132" font-size="13" font-weight="600" fill="#1b2430" text-anchor="middle">Module</text>
    <text x="410" y="150" font-size="12" fill="#2f7bd0" text-anchor="middle">ID 2</text>

    <text x="510" y="144" font-size="22" fill="#8a929e" text-anchor="middle">· · ·</text>

    <rect x="556" y="104" width="104" height="64" rx="6" fill="#f3f5f8" stroke="#e05b49" stroke-width="1.5"/>
    <text x="608" y="132" font-size="13" font-weight="600" fill="#1b2430" text-anchor="middle">Module</text>
    <text x="608" y="150" font-size="12" fill="#2f7bd0" text-anchor="middle">ID N (last)</text>
  </g>

  <!-- links -->
  <g stroke="#3a4250" stroke-width="2.5" fill="none" marker-end="url(#a2)">
    <path d="M174,136 L216,136"/>
    <path d="M324,136 L354,136"/>
    <path d="M462,136 L486,136"/>
    <path d="M534,136 L552,136"/>
  </g>
  <g font-size="11" fill="#8a929e" text-anchor="middle">
    <text x="195" y="126">Mitsumi</text>
    <text x="339" y="126">Mitsumi</text>
  </g>

  <!-- last module note -->
  <path d="M608,168 L608,196" stroke="#e05b49" stroke-width="2" fill="none"/>
  <rect x="512" y="196" width="192" height="30" rx="6" fill="#fbe9e6" stroke="#e05b49"/>
  <text x="608" y="216" font-size="12" font-weight="600" fill="#1b2430" text-anchor="middle">last module: set DIP #4 = ON</text>

  <text x="24" y="216" font-size="12" fill="#8a929e">DIP #4 = ON turns on the built-in</text>
  <text x="24" y="232" font-size="12" fill="#8a929e">termination — no resistor needed.</text>
</svg>
