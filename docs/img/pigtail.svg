<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="system-ui, sans-serif">
  <rect width="780" height="400" rx="10" fill="#ffffff"/>
  <text x="24" y="32" font-size="19" font-weight="600" fill="#1b2430">The "pigtail" — how the Pi and power join the head of the chain</text>
  <text x="24" y="54" font-size="13" fill="#6b7480">Cut one Mitsumi cable in half; the end that plugs into Module 1 becomes the pigtail.</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a4250"/></marker>
  </defs>

  <!-- 48V bus -->
  <rect x="24" y="80" width="180" height="52" rx="6" fill="#fbe9e6" stroke="#e05b49"/>
  <text x="114" y="103" font-size="13" font-weight="600" fill="#1b2430" text-anchor="middle">48 V battery bus</text>
  <text x="114" y="121" font-size="11" fill="#6b7480" text-anchor="middle">(orange safety connector IN)</text>

  <!-- Buck -->
  <rect x="24" y="168" width="180" height="64" rx="6" fill="#eef3fb" stroke="#2f7bd0"/>
  <text x="114" y="194" font-size="13" font-weight="600" fill="#1b2430" text-anchor="middle">Buck converter</text>
  <text x="114" y="213" font-size="11" fill="#6b7480" text-anchor="middle">15–80 V → 12 V</text>

  <!-- FTDI -->
  <rect x="24" y="288" width="180" height="64" rx="6" fill="#f3f5f8" stroke="#3a4250"/>
  <text x="114" y="314" font-size="13" font-weight="600" fill="#1b2430" text-anchor="middle">FTDI USB-RS485</text>
  <text x="114" y="333" font-size="11" fill="#6b7480" text-anchor="middle">USB → Raspberry Pi</text>

  <!-- Pigtail -->
  <rect x="470" y="120" width="200" height="210" rx="8" fill="#ffffff" stroke="#3a4250" stroke-width="1.5"/>
  <text x="570" y="146" font-size="14" font-weight="600" fill="#1b2430" text-anchor="middle">Pigtail (Module 1 plug)</text>
  <g font-size="12" fill="#1b2430">
    <rect x="486" y="160" width="14" height="14" rx="3" fill="#e05b49"/><text x="508" y="172">12 V — pins 1,2,11,12,13</text>
    <rect x="486" y="190" width="14" height="14" rx="3" fill="#3a4250"/><text x="508" y="202">GND — pins 3–7</text>
    <rect x="486" y="220" width="14" height="14" rx="3" fill="#2f7bd0"/><text x="508" y="232">A / D+ — pin 14</text>
    <rect x="486" y="250" width="14" height="14" rx="3" fill="#2f7bd0"/><text x="508" y="262">B / D− — pin 8</text>
    <text x="508" y="292" font-size="11" fill="#8a929e">(signal pins 9/10/15/16</text>
    <text x="508" y="307" font-size="11" fill="#8a929e">left unconnected)</text>
  </g>

  <!-- Module 1 -->
  <rect x="470" y="352" width="200" height="0" /> <!-- spacer -->

  <!-- wires -->
  <g stroke-width="3" fill="none" marker-end="url(#arr)">
    <path d="M114,132 L114,168" stroke="#e05b49"/>                 <!-- 48V -> buck -->
    <path d="M204,186 C330,186 360,167 483,167" stroke="#e05b49"/>  <!-- buck 12V -> pigtail 12V -->
    <path d="M204,214 C320,214 360,197 483,197" stroke="#3a4250"/>  <!-- buck GND -> pigtail GND -->
    <path d="M204,312 C330,312 380,227 483,227" stroke="#2f7bd0"/>  <!-- FTDI D+ -> A(14) -->
    <path d="M204,330 C340,330 380,257 483,257" stroke="#2f7bd0"/>  <!-- FTDI D- -> B(8) -->
  </g>

  <!-- module plug arrow -->
  <text x="570" y="352" font-size="12" font-weight="600" fill="#3a4250" text-anchor="middle">↓ male end plugs into Module 1 ↓</text>
  <text x="24" y="384" font-size="12" fill="#8a929e">Red = 12 V · Black = ground · Blue = RS-485 data. Share ground between the buck and the FTDI adapter.</text>
</svg>
