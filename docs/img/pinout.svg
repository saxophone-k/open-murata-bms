<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="system-ui, sans-serif">
  <rect width="760" height="440" rx="10" fill="#ffffff"/>
  <text x="30" y="34" font-size="19" font-weight="600" fill="#1b2430">Murata IJ1101M — 16-pin I/F connector</text>
  <text x="30" y="56" font-size="13" fill="#6b7480">As you look at the connector on the module (pin side). Two big center holes = mechanical guide pins (not wired).</text>

  <!-- housing -->
  <rect x="40" y="76" width="680" height="212" rx="20" fill="#ffffff" stroke="#1b2430" stroke-width="3"/>
  <rect x="66" y="104" width="628" height="156" rx="12" fill="#b8bcc4" stroke="#6b7480" stroke-width="2"/>
  <!-- keying notch (bottom center) -->
  <rect x="330" y="252" width="100" height="14" rx="3" fill="#ffffff" stroke="#6b7480" stroke-width="2"/>

  <!-- top pin numbers -->
  <g font-size="15" font-weight="600" fill="#1b2430" text-anchor="middle">
    <text x="108" y="100">11</text><text x="168" y="100">12</text><text x="228" y="100">13</text>
    <text x="528" y="100">14</text><text x="588" y="100">15</text><text x="648" y="100">16</text>
  </g>
  <!-- bottom pin numbers -->
  <g font-size="15" font-weight="600" fill="#1b2430" text-anchor="middle">
    <text x="108" y="278">1</text><text x="168" y="278">2</text><text x="228" y="278">3</text><text x="288" y="278">4</text>
    <text x="348" y="278">5</text><text x="408" y="278">6</text><text x="468" y="278">7</text><text x="528" y="278">8</text>
    <text x="588" y="278">9</text><text x="648" y="278">10</text>
  </g>

  <!-- pins: fill = function color. top row -->
  <g stroke="#1b2430" stroke-width="2">
    <!-- guide holes -->
    <circle cx="330" cy="146" r="24" fill="#ffffff"/><circle cx="438" cy="146" r="24" fill="#ffffff"/>
    <!-- 11,12,13 = 12V (red) -->
    <circle cx="108" cy="146" r="15" fill="#e05b49"/><circle cx="168" cy="146" r="15" fill="#e05b49"/><circle cx="228" cy="146" r="15" fill="#e05b49"/>
    <!-- 14 = A (blue), 15 UV, 16 CE (grey) -->
    <circle cx="528" cy="146" r="15" fill="#2f7bd0"/><circle cx="588" cy="146" r="15" fill="#c9ced6"/><circle cx="648" cy="146" r="15" fill="#c9ced6"/>
    <!-- bottom row 1..10 -->
    <circle cx="108" cy="218" r="15" fill="#e05b49"/><circle cx="168" cy="218" r="15" fill="#e05b49"/>
    <circle cx="228" cy="218" r="15" fill="#3a4250"/><circle cx="288" cy="218" r="15" fill="#3a4250"/><circle cx="348" cy="218" r="15" fill="#3a4250"/><circle cx="408" cy="218" r="15" fill="#3a4250"/><circle cx="468" cy="218" r="15" fill="#3a4250"/>
    <circle cx="528" cy="218" r="15" fill="#2f7bd0"/>
    <circle cx="588" cy="218" r="15" fill="#c9ced6"/><circle cx="648" cy="218" r="15" fill="#c9ced6"/>
  </g>

  <!-- legend -->
  <g font-size="13" fill="#1b2430">
    <rect x="40" y="316" width="16" height="16" rx="3" fill="#e05b49"/><text x="64" y="329">12 V power — pins 1, 2, 11, 12, 13 (bundle together)</text>
    <rect x="40" y="342" width="16" height="16" rx="3" fill="#3a4250"/><text x="64" y="355">Ground — pins 3, 4, 5, 6, 7 (bundle together)</text>
    <rect x="430" y="316" width="16" height="16" rx="3" fill="#2f7bd0"/><text x="454" y="329">RS-485 data — pin 14 = A/D+, pin 8 = B/D−</text>
    <rect x="430" y="342" width="16" height="16" rx="3" fill="#c9ced6"/><text x="454" y="355">Signal pins 9/10/15/16 (OV/DE/UV/CE) — ignore</text>
  </g>
  <text x="40" y="392" font-size="12" fill="#8a929e">The signal pins mirror bits you read over Modbus, so a software-only setup leaves them unconnected.</text>
  <text x="40" y="412" font-size="12" fill="#8a929e">If data won't communicate, swap A/B (pins 14 &amp; 8) — RS-485 labeling is inconsistent; swapping is harmless.</text>
</svg>
